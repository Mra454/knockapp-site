<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knock — Signal you're open to human connection</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --text: #1a1a18; --dim: #6b6b64;
      --muted: #a8a89e; --accent: #2d6a4f; --accent-light: #e8f5ee;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }
    .container { max-width: 500px; width: 100%; text-align: center; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
    .icon {
      width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #2d6a4f, #1b4332);
      box-shadow: 0 4px 28px rgba(45,106,79,0.22);
    }
    .icon svg { width: 34px; height: 34px; color: white; }
    h1 { font-family: 'Fraunces', serif; font-size: clamp(42px,9vw,58px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px; }
    .tagline { font-size: 17px; font-weight: 300; color: var(--dim); line-height: 1.65; margin-bottom: 36px; }
    .badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 500; letter-spacing: 0.06em; padding: 6px 16px; border-radius: 100px; margin-bottom: 44px; text-transform: uppercase; }
    .links { display: flex; gap: 6px; justify-content: center; align-items: center; }
    .links a { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 8px; transition: color 0.2s; }
    .links a:hover { color: var(--accent); }
    .sep { color: #d8d7d2; }
    footer { position: fixed; bottom: 20px; font-size: 11px; color: var(--muted); font-family: 'Outfit', sans-serif; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </svg>
    </div>
    <h1>Knock</h1>
    <p class="tagline">A gentle way to signal you're open to human connection — at the coffee shop, library, or wherever you find yourself.</p>
    <div class="badge">Coming soon to iOS</div>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <span class="sep">·</span>
      <a href="/support">Support</a>
    </div>
  </div>
  <footer>© 2025 Knock</footer>
</body>
</html>
